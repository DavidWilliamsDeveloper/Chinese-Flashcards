<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversation Practice</title>
    <style>
        :root {
            --bg-color: #e5ddd5;
            --left-bubble: #ffffff;
            --right-bubble: #dcf8c6;
            --accent: #075e54;
            --error-red: rgba(255, 255, 255, 0.4);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            /* Prevent text selection while tapping rapidly */
            user-select: none; 
        }

        #app-container {
            width: 100%;
            max-width: 500px;
            background: var(--bg-color);
            height: 90vh;
            display: flex;
            flex-direction: column;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            overflow: hidden;
            transition: background-color 0.3s ease;
        }

        /* The Red Flash Animation */
        #app-container.flash-red {
            background-color: var(--error-red) !important;
        }

        header {
            background: var(--accent);
            color: white;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        #chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            cursor: pointer; /* Suggests the area is clickable */
        }

        .row { display: flex; width: 100%; margin-bottom: 5px; opacity: 0; transform: translateY(10px); transition: all 0.3s ease; }
        .row.visible { opacity: 1; transform: translateY(0); }
        .row-left { justify-content: flex-start; }
        .row-right { justify-content: flex-end; }

        .bubble {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 15px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.2);
            position: relative;
        }

        .row-left .bubble { background: var(--left-bubble); border-top-left-radius: 2px; }
        .row-right .bubble { background: var(--right-bubble); border-top-right-radius: 2px; }

        .chinese { font-size: 1.45rem; font-weight: 600; color: #000; display: block; margin-bottom: 2px; }
        .pinyin { font-size: 1.45rem; color: #444; font-style: italic; }
        .phonetic { font-size: 1.45rem; color: #777; margin-bottom: 8px; }
        .divider { border: 0; border-top: 1px solid rgba(0,0,0,0.1); margin: 8px 0; }
        .english { font-size: 1.45rem; color: #222; }

        footer {
            background: #f0f0f0;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #ccc;
        }

        button {
            padding: 10px 22px;
            border: none;
            border-radius: 25px;
            background: var(--accent);
            color: white;
            cursor: pointer;
            font-weight: 600;
            z-index: 10;
        }

        button:active { transform: scale(0.95); }
        button:disabled { background: #bbb; cursor: not-allowed; }

        .counter { font-size: 0.85rem; color: #666; font-weight: bold; }
        
        .tap-hint {
            text-align: center;
            font-size: 0.8rem;
            color: #777;
            margin-top: 10px;
            font-style: italic;
        }
    </style>
</head>
<body>

<div id="app-container">
    <header id="header-text">Language Practice</header>
    
    <div id="chat-window">
        <!-- Bubbles will be injected here -->
    </div>

    <div class="tap-hint">Tap screen to reveal next bubble</div>

    <footer>
        <button id="prev-btn">Previous</button>
        <div class="counter" id="page-counter">1 / 1</div>
        <button id="next-btn">Next</button>
    </footer>
</div>

let currentConvoIndex = 0;
let currentStep = 0; // Tracks which bubble is revealed

const chatWindow = document.getElementById('chat-window');
const appContainer = document.getElementById('app-container');
const pageCounter = document.getElementById('page-counter');
const prevBtn = document.getElementById('prev-btn');
const nextBtn = document.getElementById('next-btn');

function renderConversation() {
    chatWindow.innerHTML = '';
    const convo = conversations[currentConvoIndex];
    
    convo.forEach((item, index) => {
        const row = document.createElement('div');
        row.className = `row ${item.isQ ? 'row-left' : 'row-right'}`;
        row.id = `bubble-${index}`;
        
        // Only the first bubble is visible by default
        if (index === 0) {
            row.classList.add('visible');
            currentStep = 0;
        }

        row.innerHTML = `
            <div class="bubble">
                <span class="chinese">${item.zh}</span>
                <span class="pinyin">${item.py}</span>
                <div class="phonetic">${item.ph}</div>
                <hr class="divider">
                <span class="english">${item.eng}</span>
            </div>
        `;
        chatWindow.appendChild(row);
    });

    pageCounter.innerText = `${currentConvoIndex + 1} / ${conversations.length}`;
    prevBtn.disabled = currentConvoIndex === 0;
    nextBtn.disabled = currentConvoIndex === conversations.length - 1;
    
    // Reset step counter for new conversation
    currentStep = 0;
}

function handleTap() {
    const convo = conversations[currentConvoIndex];
    
    if (currentStep < convo.length - 1) {
        currentStep++;
        const nextBubble = document.getElementById(`bubble-${currentStep}`);
        nextBubble.classList.add('visible');
        
        // --- NEW SCROLL LOGIC ---
        // Calculate heights
        const windowHeight = chatWindow.clientHeight;
        const bubbleHeight = nextBubble.offsetHeight;
        
        // If bubble is too tall to fit comfortably or pushes others out
        // we scroll this specific bubble to the top.
        if (bubbleHeight > windowHeight * 0.7) {
            nextBubble.scrollIntoView({ behavior: 'smooth', block: 'start' });
        } else {
            // Otherwise, just ensure the bottom is visible
            chatWindow.scrollTo({ 
                top: chatWindow.scrollHeight, 
                behavior: 'smooth' 
            });
        }
        // -------------------------
        
    } else {
        triggerRedFlash();
    }
}


function triggerRedFlash() {
    appContainer.classList.add('flash-red');
    setTimeout(() => {
        appContainer.classList.remove('flash-red');
    }, 300);
}

// Event Listeners
chatWindow.addEventListener('click', handleTap);

prevBtn.addEventListener('click', (e) => {
    e.stopPropagation(); // Prevent trigger tap
    if (currentConvoIndex > 0) {
        currentConvoIndex--;
        renderConversation();
    }
});

nextBtn.addEventListener('click', (e) => {
    e.stopPropagation(); // Prevent trigger tap
    if (currentConvoIndex < conversations.length - 1) {
        currentConvoIndex++;
        renderConversation();
    }
});

// Initial Load
renderConversation();
</script>

</body>
</html>
