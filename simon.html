<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro Simon Clone</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --panel-color: #333;
            --red: #ff4d4d;
            --green: #2ecc71;
            --blue: #3498db;
            --yellow: #f1c40f;
            --red-bright: #ff0000;
            --green-bright: #00ff00;
            --blue-bright: #0000ff;
            --yellow-bright: #ffff00;
        }

        body {
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            touch-action: manipulation;
        }

        #game-container {
            position: relative;
            width: 90vw;
            max-width: 400px;
            aspect-ratio: 1 / 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            background: #000;
            padding: 15px;
            border-radius: 50%;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        .pad {
            border-radius: inherit;
            cursor: pointer;
            transition: brightness 0.1s;
            opacity: 0.6;
            -webkit-tap-highlight-color: transparent;
        }

        .pad.active {
            opacity: 1;
            filter: brightness(1.5);
            box-shadow: 0 0 30px white;
        }

        #green { background-color: var(--green); border-top-left-radius: 100% 100%; }
        #red { background-color: var(--red); border-top-right-radius: 100% 100%; }
        #yellow { background-color: var(--yellow); border-bottom-left-radius: 100% 100%; }
        #blue { background-color: var(--blue); border-bottom-right-radius: 100% 100%; }

        #center-control {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40%;
            height: 40%;
            background: var(--panel-color);
            border-radius: 50%;
            border: 10px solid #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            z-index: 10;
        }

        #score-display {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 5px;
        }

        button {
            padding: 8px 16px;
            font-size: 0.9rem;
            text-transform: uppercase;
            font-weight: bold;
            background: #555;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:active {
            background: #777;
        }

        #status-text {
            margin-top: 20px;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div class="pad" id="green"></div>
        <div class="pad" id="red"></div>
        <div class="pad" id="yellow"></div>
        <div class="pad" id="blue"></div>
        
        <div id="center-control">
            <div id="score-display">--</div>
            <button id="start-btn">Start</button>
        </div>
    </div>

    <div id="status-text">Press Start</div>

    <script>
        // --- Game State ---
        let sequence = [];
        let userSequence = [];
        let level = 0;
        let isPlayingSequence = false;
        let gameActive = false;

        // --- Audio Context ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const frequencies = {
            green: 329.63, // E4
            red: 261.63,   // C4
            yellow: 220.00, // A3
            blue: 164.81    // E3
        };

        // --- Elements ---
        const pads = {
            green: document.getElementById('green'),
            red: document.getElementById('red'),
            yellow: document.getElementById('yellow'),
            blue: document.getElementById('blue')
        };
        const startBtn = document.getElementById('start-btn');
        const scoreDisplay = document.getElementById('score-display');
        const statusText = document.getElementById('status-text');

        // --- Functions ---

        function playTone(color, duration = 400) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.frequency.value = frequencies[color];
            osc.type = 'sine';
            
            gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration/1000);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.start();
            osc.stop(audioCtx.currentTime + duration/1000);
            
            pads[color].classList.add('active');
            setTimeout(() => pads[color].classList.remove('active'), duration - 50);
        }

        async function playSequence() {
            isPlayingSequence = true;
            statusText.innerText = "Watch...";
            
            for (const color of sequence) {
                await new Promise(resolve => setTimeout(resolve, 600 - (level * 20))); // Gets faster
                playTone(color);
                await new Promise(resolve => setTimeout(resolve, 300));
            }
            
            isPlayingSequence = false;
            statusText.innerText = "Your Turn!";
            userSequence = [];
        }

        function nextRound() {
            level++;
            scoreDisplay.innerText = level;
            const colors = ['green', 'red', 'yellow', 'blue'];
            sequence.push(colors[Math.floor(Math.random() * 4)]);
            playSequence();
        }

        function gameOver() {
            statusText.innerText = "Game Over!";
            gameActive = false;
            startBtn.innerText = "Restart";
            // Play error tone
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.frequency.value = 100;
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.5);
        }

        function handlePadClick(color) {
            if (!gameActive || isPlayingSequence) return;

            playTone(color);
            userSequence.push(color);

            const currentIndex = userSequence.length - 1;
            
            if (userSequence[currentIndex] !== sequence[currentIndex]) {
                gameOver();
                return;
            }

            if (userSequence.length === sequence.length) {
                statusText.innerText = "Correct!";
                setTimeout(nextRound, 1000);
            }
        }

        // --- Event Listeners ---

        startBtn.addEventListener('click', () => {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            sequence = [];
            level = 0;
            gameActive = true;
            startBtn.innerText = "Reset";
            nextRound();
        });

        Object.keys(pads).forEach(color => {
            pads[color].addEventListener('pointerdown', () => handlePadClick(color));
        });
    </script>
</body>
</html>
